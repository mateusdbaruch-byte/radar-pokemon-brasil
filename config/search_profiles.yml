demand_leads:
  description: "Busca compradores potenciais procurando cartas."
  intent_filter:
    - BUYER_DEMAND
    - HIGH_INTENT_LEAD
    - DISCUSSION_SIGNAL
  strict: true
  min_confidence: 60
  buyer_only: true
  seller_only: false
  profile_blocked_domains:
    - amazon.com.br
    - amazon.com
  domain_groups:
    - communities
    - social_public
  query_templates:
    - template: '"compro {card}" "Pokémon TCG"'
      enabled: true
      priority_weight: 100
    - template: '"pago" "{card}" "Pokémon TCG" "carta"'
      enabled: true
      priority_weight: 90
    - template: '"procuro {card}" "carta" "Pokémon TCG"'
      enabled: true
      priority_weight: 70
    - template: '"falta {card}" "coleção" "Pokémon"'
      enabled: true
      priority_weight: 65
    - template: '"fechando coleção" "{card}" "Pokémon"'
      enabled: true
      priority_weight: 60
    - template: '"master set" "{card}" "Pokémon"'
      enabled: true
      priority_weight: 60
    - template: 'site:facebook.com "{card}" "compro" "Pokémon TCG"'
      enabled: true
      priority_weight: 55
    - template: 'site:reddit.com "{card}" "procuro" "Pokémon"'
      enabled: true
      priority_weight: 50
    - template: 'site:instagram.com "{card}" "procuro" "Pokémon TCG"'
      enabled: true
      priority_weight: 45
    - template: 'site:youtube.com "{card}" "procuro" "Pokémon TCG"'
      enabled: true
      priority_weight: 40
    - template: '"alguém vende {card}" "Pokémon"'
      enabled: true
      priority_weight: 25
    - template: '"alguem vende {card}" "Pokemon"'
      enabled: false
      priority_weight: 15

